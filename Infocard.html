<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html {
            background-color: rgba(21, 66, 16, 0.767);
            color:rgb(205, 208, 194);
        }

        #base {
            width: 250px;
            height: 100vh;
            background-color: rgba(19, 71, 3, 0.509);
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-radius: 10px;
        }

        #content {
            margin: 5px;
            width: 90%;
            height: 40%;
            background-color: rgba(139, 161, 60, 0.5);
            align-items: center;
            justify-content: center;
            display: flex;
        }

        .tags {
            background-color: rgba(72, 166, 72, 0.484);
            padding: 5px 10px;
            margin: 5px;
            border-radius: 10px;
            border: 1px solid rgba(0, 0, 0, 0.5);
            display: inline-block;
        }

        #para {
            margin: 20px;
            text-align: left;
        }
        button:hover {
            background-color: rgba(142, 239, 156, 0.5);
            color:white;
        }
    </style>
</head>

<body>
    <div id="base">
        <div id="content">
            <img src="https://tse3.mm.bing.net/th/id/OIP.bBbzihEKBNvROfwkmWeOJgHaEo?rs=1&pid=ImgDetMain&o=7&rm=3"
                width="90%" height="80%" alt="Reference Image">
        </div>
        <div>
            <p class="tags">Nature</p>
            <p class="tags">Trees</p>
            <h1 style="text-align: center; font-size: 24px;">Nature's Beauty</h1>
            <p id="para">"The earth has music for those who listen."</p>
        </div>
        <div>
            <button style="padding: 10px 20px; margin: 10px; border-radius: 5px; border: none; background-color: rgba(101, 202, 136, 0.253); color: rgb(1, 1, 1); cursor: pointer;">Read More</button>
        </div>

    </div>
</body>

</html>
